<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#11111a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16161f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="orb1" cx="20%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />
  
  <!-- Orbs -->
  <ellipse cx="240" cy="126" rx="400" ry="300" fill="url(#orb1)" />
  <ellipse cx="960" cy="504" rx="350" ry="250" fill="url(#orb2)" />
  
  <!-- Decorative elements -->
  <circle cx="600" cy="315" r="200" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.1" />
  <circle cx="600" cy="315" r="150" fill="none" stroke="#f472b6" stroke-width="1" opacity="0.1" />
  <circle cx="600" cy="315" r="100" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.1" />
  
  <!-- Text -->
  <text x="600" y="260" font-family="Georgia, serif" font-size="64" font-weight="700" fill="url(#textGradient)" text-anchor="middle" letter-spacing="4">EMOTIONAL RESONANCE</text>
  
  <text x="600" y="340" font-family="system-ui, sans-serif" font-size="24" fill="#8a8a9a" text-anchor="middle" letter-spacing="1">
    A Sanctuary for the Soul
  </text>
  
  <text x="600" y="380" font-family="system-ui, sans-serif" font-size="18" fill="#5a5a6a" text-anchor="middle" letter-spacing="0.5">
    Guided Meditations • Soundscapes • Emotional Wisdom
  </text>
  
  <!-- Bottom accent -->
  <path d="M400 450 Q600 420 800 450" fill="none" stroke="url(#textGradient)" stroke-width="3" />
  <circle cx="600" cy="420" r="8" fill="url(#textGradient)" />
</svg>