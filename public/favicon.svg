<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="24" cy="24" r="22" fill="url(#bgGradient)" filter="url(#glow)" opacity="0.9"/>
  
  <!-- Sound wave icon -->
  <g fill="white" filter="url(#glow)">
    <path d="M14 24c0-4.418 3.582-8 8-8v16c-4.418 0-8-3.582-8-8z" opacity="0.9"/>
    <path d="M10 24c0-6.627 5.373-12 12-12v24c-6.627 0-12-5.373-12-12z" opacity="0.6"/>
    <path d="M6 24c0-8.837 7.163-16 16-16v32c-8.837 0-16-7.163-16-16z" opacity="0.3"/>
  </g>
  
  <!-- Center dot -->
  <circle cx="24" cy="24" r="3" fill="white" opacity="0.9"/>
</svg>